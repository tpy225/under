<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>谁是卧底</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-900 text-white font-sans h-screen w-full overflow-hidden flex items-center justify-center">

    <div id="app-container" class="w-full max-w-md h-full bg-gray-800 relative flex flex-col shadow-2xl overflow-hidden">

        <!-- ================= LOBBY AREA ================= -->
        <div id="lobby-area" class="w-full h-full flex flex-col relative z-10 bg-gray-100 text-gray-800 overflow-y-auto">
            
            <!-- 1. 首页: 加入或创建 -->
            <div id="home-view" class="view active p-6 flex flex-col items-center justify-center h-full space-y-8 bg-gradient-to-b from-indigo-100 to-gray-100">
                <div class="text-center">
                    <h1 class="text-5xl font-black text-indigo-600 mb-2 tracking-wider drop-shadow-md">谁是卧底</h1>
                    <p class="text-gray-500 font-medium tracking-widest">UNDERCOVER</p>
                </div>
                
                <div class="w-full space-y-5 bg-white p-6 rounded-3xl shadow-xl">
                    <input type="text" id="player-name" placeholder="请输入你的昵称" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 font-bold text-center text-lg">
                    
                    <div class="border-t border-gray-100 pt-5">
                        <p class="text-xs text-gray-400 font-bold mb-2 uppercase">Join Game</p>
                        <div class="flex space-x-2">
                            <input type="text" id="room-code-input" placeholder="输入房间码" class="flex-1 px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl uppercase text-center font-black tracking-widest focus:outline-none focus:ring-2 focus:ring-indigo-500 text-lg">
                            <button id="join-room-btn" class="bg-indigo-600 text-white px-6 py-3 rounded-xl hover:bg-indigo-700 font-bold shadow-md transition transform active:scale-95 text-lg">加入</button>
                        </div>
                    </div>

                    <div class="border-t border-gray-100 pt-5 text-center">
                        <p class="text-xs text-gray-400 font-bold mb-2 uppercase">Host Game</p>
                        <button id="show-create-view-btn" class="w-full bg-green-500 text-white px-4 py-3 rounded-xl hover:bg-green-600 font-bold shadow-md transition transform active:scale-95 text-lg">创建新房间</button>
                    </div>
                </div>
            </div>

            <!-- 2. 创建房间设置页 -->
            <div id="create-room-view" class="view p-6 hidden flex-col h-full bg-white">
                <h2 class="text-2xl font-black mb-6 text-gray-800 text-center">创建房间</h2>
                <div class="space-y-5 flex-1 overflow-y-auto pb-4 px-1">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">游戏模式</label>
                        <select id="game-mode" class="w-full border-2 border-gray-200 bg-gray-50 rounded-xl p-3 focus:outline-none focus:ring-2 focus:ring-indigo-500 font-medium">
                            <option value="auto">自动词库模式</option>
                            <option value="host">主持人模式 (房主出词)</option>
                        </select>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-1">人数上限</label>
                            <input type="number" id="max-players" value="6" min="4" max="12" class="w-full border-2 border-gray-200 bg-gray-50 rounded-xl p-3 font-bold text-center">
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-1">卧底数量</label>
                            <input type="number" id="undercover-count" value="1" min="1" max="3" class="w-full border-2 border-gray-200 bg-gray-50 rounded-xl p-3 font-bold text-center">
                        </div>
                    </div>

                    <div class="flex items-center bg-indigo-50 p-4 rounded-xl border border-indigo-100">
                        <input type="checkbox" id="enable-whitecard" class="h-5 w-5 text-indigo-600 rounded">
                        <label class="ml-3 block font-bold text-indigo-900">启用白卡 (Mr. White)</label>
                    </div>

                    <div id="host-words-setting" class="hidden space-y-3 border-2 border-gray-200 p-4 rounded-xl bg-gray-50">
                        <label class="block text-sm font-bold text-gray-700">自定义一对词语</label>
                        <input type="text" id="host-civilian-word" placeholder="平民词" class="w-full border-2 rounded-lg p-3 font-medium">
                        <input type="text" id="host-undercover-word" placeholder="卧底词" class="w-full border-2 rounded-lg p-3 font-medium">
                    </div>

                    <div id="custom-words-setting" class="space-y-2 border-2 border-gray-200 p-4 rounded-xl bg-gray-50">
                        <label class="block text-sm font-bold text-gray-700">自定义词库 (可选)</label>
                        <p class="text-xs text-gray-500 mb-2">每行一对，逗号或空格分隔。留空则使用系统默认。</p>
                        <textarea id="custom-words-input" rows="3" placeholder="例如：&#10;苹果,芒果&#10;手机 电脑" class="w-full border-2 rounded-lg p-3 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-indigo-500"></textarea>
                    </div>
                </div>
                
                <div class="mt-4 flex space-x-3 pt-4 border-t border-gray-100">
                    <button id="back-home-btn" class="flex-1 bg-gray-200 text-gray-800 py-3 rounded-xl font-bold transition transform active:scale-95">返回</button>
                    <button id="create-room-btn" class="flex-1 bg-green-500 text-white py-3 rounded-xl font-bold shadow-md transition transform active:scale-95">创建游戏</button>
                </div>
            </div>
        </div>

        <!-- ================= ROOM AREA (GAME & CHAT) ================= -->
        <div id="room-area" class="w-full h-full hidden flex-col relative z-20 bg-gray-900 text-white">
            
            <!-- Room Header -->
            <div class="bg-gray-800 border-b border-gray-700 p-3 flex justify-between items-center shadow-md z-30">
                <div class="flex items-center space-x-3">
                    <button id="leave-room-btn" class="text-gray-400 hover:text-white transition">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                        </svg>
                    </button>
                    <div class="font-bold text-gray-300 flex items-center">
                        <span class="text-xs bg-indigo-600 text-white px-2 py-1 rounded mr-2">房间</span>
                        <span id="display-room-code" class="text-white tracking-widest text-lg"></span>
                    </div>
                </div>
                <div class="text-sm bg-gray-700 px-3 py-1 rounded-full font-medium">
                    <span id="player-count">0/0</span> 人
                </div>
            </div>

            <!-- Game Views Container (Top 2/3) -->
            <div id="game-views" class="flex-1 overflow-y-auto p-4 relative z-10 flex flex-col">
                
                <!-- 3. 等待室 -->
                <div id="waiting-view" class="view hidden flex-col h-full items-center">
                    <h2 class="text-xl font-bold text-yellow-400 mb-6 mt-4">等待玩家加入...</h2>
                    
                    <!-- Player Grid -->
                    <div id="waiting-player-grid" class="grid grid-cols-3 gap-6 w-full max-w-sm mb-auto">
                        <!-- generated dynamically -->
                    </div>

                    <div class="w-full mt-6" id="host-controls" style="display: none;">
                        <button id="start-game-btn" class="w-full bg-green-500 text-white py-4 rounded-full font-black shadow-[0_4px_0_#16a34a] active:translate-y-1 active:shadow-none transition text-xl">开始游戏</button>
                    </div>
                    <div class="w-full mt-6 text-center text-gray-400 font-bold" id="waiting-text">
                        等待房主开始...
                    </div>
                </div>

                <!-- 4. 身份页 -->
                <div id="role-view" class="view hidden flex-col h-full items-center justify-center">
                    <h2 class="text-2xl font-black mb-8 text-yellow-400 drop-shadow-md">你的身份</h2>
                    
                    <div class="bg-gradient-to-br from-indigo-500 to-purple-700 text-white p-8 rounded-2xl shadow-2xl w-full max-w-sm text-center border-4 border-indigo-400 transform transition-transform" id="role-card">
                        <div class="text-sm font-bold text-indigo-200 mb-2 uppercase">你的词语是</div>
                        <div id="my-word" class="text-5xl font-black tracking-widest mb-4 drop-shadow-lg">???</div>
                        <div id="role-description" class="text-sm text-indigo-100 font-medium">请记住你的词语，不要让别人看到</div>
                    </div>

                    <button id="remembered-btn" class="mt-12 bg-white text-indigo-900 px-10 py-4 rounded-full font-black shadow-[0_4px_0_#cbd5e1] active:translate-y-1 active:shadow-none transition text-lg">我已记住</button>
                </div>

                <!-- 5. 发言页 -->
                <div id="speech-view" class="view hidden flex-col h-full">
                    <div class="text-center mb-4 relative">
                        <h2 class="text-xl font-bold text-yellow-400">第 <span id="round-number">1</span> 轮发言</h2>
                        <p class="text-sm text-gray-300 mt-1">剩余存活: <span id="alive-count" class="font-bold text-white"></span></p>
                        <div id="speech-timer" class="absolute right-0 top-0 bg-red-500 text-white text-xs font-bold px-2 py-1 rounded-full animate-pulse hidden">03:00</div>
                    </div>

                    <!-- Speech Player Grid -->
                    <div id="speech-player-grid" class="grid grid-cols-4 gap-3 mb-4">
                        <!-- generated dynamically -->
                    </div>

                    <!-- Speech Log -->
                    <div class="flex-1 flex flex-col min-h-[150px] bg-gray-800 border border-gray-700 rounded-xl p-3 shadow-inner overflow-hidden mb-2">
                        <h3 class="text-xs text-gray-400 font-bold mb-2 uppercase">发言记录</h3>
                        <div id="speech-log" class="flex-1 overflow-y-auto space-y-2 text-sm">
                            <!-- 发言记录 -->
                        </div>
                    </div>

                    <div id="host-speech-controls" class="hidden mt-2">
                        <button id="next-speaker-btn" class="w-full bg-gray-700 text-gray-300 py-2 rounded-lg text-sm font-bold hover:bg-gray-600 transition">强制跳过当前玩家(房主)</button>
                    </div>
                </div>

                <!-- 6. 投票页 -->
                <div id="vote-view" class="view hidden flex-col h-full">
                    <h2 class="text-2xl font-black mb-2 text-center text-yellow-400">投票阶段</h2>
                    <p class="text-center text-gray-400 mb-6 text-sm font-medium">选择你认为是卧底/白卡的玩家</p>

                    <!-- Vote Player Grid -->
                    <div id="vote-player-grid" class="grid grid-cols-3 gap-4 mb-auto">
                        <!-- generated dynamically -->
                    </div>
                    
                    <div class="mt-6">
                        <button id="submit-vote-btn" class="w-full bg-indigo-600 text-white py-4 rounded-full font-black shadow-[0_4px_0_#4f46e5] active:translate-y-1 active:shadow-none transition text-lg disabled:opacity-50 disabled:shadow-none disabled:cursor-not-allowed" disabled>确认投票</button>
                    </div>
                </div>

                <!-- 7. 结算/淘汰页 -->
                <div id="result-view" class="view hidden flex-col h-full items-center justify-center text-center">
                    <div class="bg-gray-800 p-6 rounded-3xl border border-gray-700 w-full shadow-2xl">
                        <h2 id="result-title" class="text-3xl font-black mb-2 text-red-500">玩家A 出局</h2>
                        <p id="result-role" class="text-lg mb-6 text-gray-300 font-medium">TA的身份是: <span class="font-bold text-white">卧底</span></p>
                        
                        <div id="whitecard-guess-section" class="hidden w-full bg-gray-900 p-5 rounded-2xl mb-6 border border-yellow-500/30">
                            <h3 class="font-black text-yellow-400 mb-2">白卡绝地反击</h3>
                            <p class="text-sm text-gray-400 mb-4">猜出平民词即可获胜：</p>
                            <input type="text" id="whitecard-guess-input" placeholder="输入你猜的平民词" class="w-full bg-gray-800 border border-gray-600 rounded-lg p-3 mb-3 text-white font-bold text-center focus:outline-none focus:border-yellow-500">
                            <button id="submit-guess-btn" class="w-full bg-yellow-500 text-gray-900 py-3 rounded-lg font-black shadow-md">提交猜测</button>
                        </div>

                        <div id="game-over-section" class="hidden w-full mb-6">
                            <h3 class="text-3xl font-black text-green-400 mb-2 drop-shadow-md">游戏结束</h3>
                            <p id="winner-text" class="text-xl font-bold mb-6 text-white">平民胜利！</p>
                            <div class="bg-gray-900 p-4 rounded-2xl text-left border border-gray-700 flex justify-around">
                                <div class="text-center">
                                    <p class="text-xs text-gray-500 font-bold uppercase mb-1">平民词</p>
                                    <p class="text-lg font-black text-blue-400" id="reveal-civilian"></p>
                                </div>
                                <div class="w-px bg-gray-700"></div>
                                <div class="text-center">
                                    <p class="text-xs text-gray-500 font-bold uppercase mb-1">卧底词</p>
                                    <p class="text-lg font-black text-red-400" id="reveal-undercover"></p>
                                </div>
                            </div>
                        </div>

                        <div id="result-actions" class="w-full mt-4 space-y-3">
                            <button id="next-round-btn" class="w-full bg-indigo-600 text-white py-3 rounded-full font-black shadow-md hidden">进入下一轮</button>
                            <button id="back-to-waiting-btn" class="w-full bg-gray-700 text-white py-3 rounded-full font-bold shadow-md hidden hover:bg-gray-600">返回等待室</button>
                            <p id="waiting-host-next-msg" class="text-gray-500 text-sm font-bold hidden">等待房主操作...</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Live Chat & Interaction Area (Bottom 1/3) -->
            <div id="interaction-area" class="h-[30%] min-h-[200px] flex flex-col bg-gray-900 bg-opacity-95 rounded-t-3xl shadow-[0_-10px_20px_rgba(0,0,0,0.5)] z-40 border-t border-gray-800 backdrop-blur-sm relative">
                
                <!-- Toggle Chat size (Optional small handle) -->
                <div class="w-full flex justify-center py-2">
                    <div class="w-12 h-1 bg-gray-600 rounded-full"></div>
                </div>

                <!-- Live Chat Messages -->
                <div id="chat-messages" class="flex-1 overflow-y-auto px-4 pb-2 space-y-1 text-sm mask-image-top">
                    <!-- Chat Bubbles inserted here -->
                </div>

                <!-- Inputs Area -->
                <div class="p-3 pb-safe bg-gray-800 rounded-t-2xl mt-auto">
                    <!-- Speech Input -->
                    <div id="speech-input-area" class="hidden flex gap-2">
                        <input type="text" id="speech-input" placeholder="请描述你的词语..." class="flex-1 bg-yellow-400 text-gray-900 rounded-full px-4 py-2 font-black placeholder-yellow-700 focus:outline-none focus:ring-2 focus:ring-yellow-300">
                        <button id="send-speech-btn" class="bg-yellow-600 text-white px-5 py-2 rounded-full font-black shadow-md active:scale-95 transition whitespace-nowrap">发送描述</button>
                    </div>
                    <!-- Chat Input -->
                    <div id="chat-input-area" class="flex gap-2">
                        <input type="text" id="chat-input" placeholder="说点什么..." class="flex-1 bg-gray-700 text-white rounded-full px-4 py-2 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-indigo-500 border border-gray-600">
                        <button id="chat-send-btn" class="bg-indigo-600 text-white px-5 py-2 rounded-full text-sm font-bold shadow-md active:scale-95 transition whitespace-nowrap">发送</button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="app.js"></script>
</body>
</html>
